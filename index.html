<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            font-family: 'Inter', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
            color: #1e293b;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة بأناقة */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(59,130,246,0.08) 0%, transparent 30%),
                        radial-gradient(circle at 30% 70%, rgba(139,92,246,0.08) 0%, transparent 30%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 6px);
            z-index: -1;
            pointer-events: none;
            animation: backgroundShift 30s infinite alternate;
        }

        @keyframes backgroundShift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(1deg) scale(1.02); }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0b1120 0%, #0f172a 100%);
            }
            body::before {
                background: radial-gradient(circle at 70% 30%, rgba(59,130,246,0.15) 0%, transparent 30%),
                            radial-gradient(circle at 30% 70%, rgba(139,92,246,0.15) 0%, transparent 30%),
                            repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 6px);
            }
            .tool-card {
                background: rgba(30, 41, 59, 0.8);
                backdrop-filter: blur(5px);
                border: 1px solid rgba(51, 65, 85, 0.5);
            }
            .category-header {
                background: rgba(30, 41, 59, 0.8);
                backdrop-filter: blur(5px);
                border-color: rgba(51, 65, 85, 0.5);
            }
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        /* الهيدر مع تأثير الكتابة */
        .header {
            padding: 50px 0 30px;
            text-align: center;
            animation: fadeInDown 1.2s ease-out;
        }
        .header h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
            animation: gradientFlow 6s ease infinite, float 6s ease-in-out infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .typing-text {
            font-size: 1.4rem;
            color: #64748b;
            max-width: 700px;
            margin: 0 auto;
            border-left: 3px solid #3b82f6;
            padding-right: 15px;
            animation: blinkCursor 1s step-end infinite;
        }
        @keyframes blinkCursor {
            0%, 100% { border-color: #3b82f6; }
            50% { border-color: transparent; }
        }

        /* شريط البحث الفاخر */
        .search-section {
            margin: 30px 0 50px;
            display: flex;
            justify-content: center;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        .search-box {
            position: relative;
            width: 100%;
            max-width: 550px;
            transform: scale(1);
            transition: transform 0.3s;
        }
        .search-box:hover {
            transform: scale(1.02);
        }
        .search-box input {
            width: 100%;
            padding: 18px 60px 18px 25px;
            border: 2px solid rgba(59,130,246,0.2);
            border-radius: 60px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            color: #1e293b;
            transition: all 0.4s;
            -webkit-user-select: text;
            user-select: text;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
        }
        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 8px rgba(59,130,246,0.2), 0 10px 30px -5px #3b82f6;
            background: white;
        }
        .search-box i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #3b82f6;
            font-size: 1.4rem;
            transition: transform 0.3s;
        }
        .search-box:hover i {
            transform: translateY(-50%) rotate(10deg);
        }

        /* أقسام التصنيفات مع أنيميشن دخول */
        .category {
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 0.8s forwards;
        }
        .category:nth-child(odd) {
            animation-delay: 0.2s;
        }
        .category:nth-child(even) {
            animation-delay: 0.4s;
        }
        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(59,130,246,0.2);
            box-shadow: 0 8px 25px -8px rgba(0,0,0,0.1);
            width: fit-content;
            transition: all 0.4s;
            cursor: default;
        }
        .category-header:hover {
            background: white;
            border-color: #3b82f6;
            transform: translateX(10px);
            box-shadow: 0 15px 30px -10px #3b82f6;
        }
        .category-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            transition: transform 0.5s;
        }
        .category-header:hover .category-icon {
            transform: rotate(360deg) scale(1.1);
        }
        .category-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* شبكة البطاقات */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 25px;
        }
        .tool-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            border-radius: 28px;
            padding: 25px 20px;
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(203,213,225,0.5);
            display: flex;
            flex-direction: column;
            cursor: default;
            opacity: 0;
            transform: scale(0.9);
            animation: cardPop 0.5s forwards;
            animation-delay: calc(0.1s * var(--card-index, 1));
        }
        @keyframes cardPop {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .tool-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 40px -15px #3b82f6;
            border-color: #3b82f6;
            background: white;
        }
        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #dbeafe, #ede9fe);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #3b82f6;
            margin-bottom: 20px;
            transition: all 0.4s;
        }
        .tool-card:hover .card-icon {
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            color: white;
            transform: rotate(8deg) scale(1.15);
        }
        .tool-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            transition: color 0.3s;
        }
        .tool-card:hover .tool-name {
            color: #3b82f6;
        }
        .tool-desc {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 20px;
            flex: 1;
        }
        .tool-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: #f1f5f9;
            border-radius: 40px;
            color: #1e293b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.4s;
            border: 1px solid transparent;
            align-self: flex-start;
            position: relative;
            overflow: hidden;
        }
        .tool-link::before {
            content: "";
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.2), transparent);
            transition: right 0.5s;
        }
        .tool-link:hover::before {
            right: 100%;
        }
        .tool-link:hover {
            background: #3b82f6;
            color: white;
            gap: 12px;
            transform: translateX(-5px);
        }
        .tool-link i {
            font-size: 0.8rem;
            transition: transform 0.3s;
        }
        .tool-link:hover i {
            transform: translateX(-5px);
        }

        /* رسالة لا توجد نتائج */
        #noResults {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.6rem;
            color: #94a3b8;
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* زر العودة للأعلى */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
            transition: all 0.4s;
            border: none;
            opacity: 0.9;
            z-index: 99;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59,130,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }
        .back-to-top:hover {
            opacity: 1;
            transform: scale(1.15) rotate(360deg);
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(59,130,246,0.2);
            margin-top: auto;
            color: #64748b;
            backdrop-filter: blur(5px);
            animation: fadeInUp 1s;
        }
        .footer .copyright {
            font-weight: 700;
            color: #3b82f6;
        }

        /* منع التحديد */
        img, a {
            -webkit-user-drag: none;
            user-drag: none;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.8rem; }
            .category-header { padding: 8px 20px; }
            .category-title { font-size: 1.5rem; }
        }
    </style>
</head>

            {

            {

                    { name: "HubSpot", desc: "إدارة العملاء والتسويق بالذكاء الاصطناعي.", url: "https://www.hubspot.com", icon: "fa-brands fa-hubspot" },

            {

                icon: "fa-solid fa-file-lines",
                tools: [

                tools: [

                    { name: "There's An AI For That", desc: "البحث عن أدوات AI حسب المهمة.", url: "https://theresanaiforthat.com", icon: "fa-solid fa-magnifying-glass-chart" }
                ]
            }
        ];

        // تأثير الكتابة للنص السفلي
        const textElement = document.getElementById('typingText');
        const phrases = ["دليل متكامل لأدوات الذكاء الاصطناعي", "اكتشف المستقبل اليوم", "أحدث تقنيات 2026"];
        let phraseIndex = 0;
        let charIndex = 0;
        function typeEffect() {
            if (charIndex < phrases[phraseIndex].length) {
                textElement.innerHTML += phrases[phraseIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeEffect, 100);
            } else {
                setTimeout(eraseEffect, 2000);
            }
        }
        function eraseEffect() {
            if (charIndex > 0) {
                textElement.innerHTML = phrases[phraseIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(eraseEffect, 50);
            } else {
                phraseIndex = (phraseIndex + 1) % phrases.length;
                setTimeout(typeEffect, 500);
            }
        }
        setTimeout(typeEffect, 1000);

        // عرض جميع التصنيفات
        function renderAllTools() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            categories.forEach(cat => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon"><i class="${cat.icon}"></i></div>
                        <h2 class="category-title">${cat.name}</h2>
                    </div>
                    <div class="tools-grid">
                        ${cat.tools.map((tool, index) => `
                            <div class="tool-card" style="--card-index: ${index};">
                                <div class="card-icon"><i class="${tool.icon}"></i></div>
                                <h3 class="tool-name">${tool.name}</h3>
                                <p class="tool-desc">${tool.desc}</p>
                                <a href="${tool.url}" class="tool-link" target="_blank" rel="noopener noreferrer">
                                    <span>زيارة</span>
                                    <i class="fa-solid fa-arrow-left"></i>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(categoryDiv);
            });
        }

        // وظيفة البحث
        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('categoriesContainer');
            const noResults = document.getElementById('noResults');
            if (query === '') {
                renderAllTools();
                noResults.style.display = 'none';
                return;
            }

            let anyVisible = false;
            container.innerHTML = '';
            categories.forEach(cat => {
                const filteredTools = cat.tools.filter(tool =>
                    tool.name.toLowerCase().includes(query) ||
                    tool.desc.toLowerCase().includes(query)
                );
                if (filteredTools.length > 0) {
                    anyVisible = true;
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';
                    categoryDiv.innerHTML = `
                        <div class="category-header">
                            <div class="category-icon"><i class="${cat.icon}"></i></div>
                            <h2 class="category-title">${cat.name}</h2>
                        </div>
                        <div class="tools-grid">
                            ${filteredTools.map((tool, index) => `
                                <div class="tool-card" style="--card-index: ${index};">
                                    <div class="card-icon"><i class="${tool.icon}"></i></div>
                                    <h3 class="tool-name">${tool.name}</h3>
                                    <p class="tool-desc">${tool.desc}</p>
                                    <a href="${tool.url}" class="tool-link" target="_blank" rel="noopener noreferrer">
                                        <span>زيارة</span>
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(categoryDiv);
                }
            });
            noResults.style.display = anyVisible ? 'none' : 'block';
        }

        // منع النسخ
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 's' || e.key === 'p')) {
                e.preventDefault();
                alert("النسخ غير مسموح به.");
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                alert("أدوات المطور مقفلة.");
            }
        });
        document.addEventListener('contextmenu', e => {
            e.preventDefault();
            alert("النقر بالزر الأيمن غير متاح.");
        });

        window.onload = renderAllTools;
    </script>
